<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Golf Multiplayer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      background: #1a1a2e;
      color: #eee;
    }

    #game-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* ── Overlay Screens ─────────────────────────── */

    .screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: auto;
    }

    .screen.hidden { display: none; }

    .screen-panel {
      background: rgba(15, 15, 35, 0.92);
      border-radius: 16px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      max-width: 420px;
      width: 90%;
    }

    .screen-panel h1 {
      font-size: 2.2rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #44cc44, #4488ff);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .screen-panel h2 {
      font-size: 1.3rem;
      margin-bottom: 20px;
      color: #aaa;
      font-weight: 400;
    }

    .screen-panel input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #333;
      border-radius: 8px;
      background: #1a1a2e;
      color: #eee;
      font-size: 1rem;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    .screen-panel input:focus {
      border-color: #4488ff;
    }

    .screen-panel input::placeholder { color: #666; }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s;
      margin: 6px;
    }

    .btn:hover { transform: scale(1.04); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, #4488ff, #3366dd);
      color: #fff;
    }

    .btn-green {
      background: linear-gradient(135deg, #44cc44, #33aa33);
      color: #fff;
    }

    .btn-small {
      padding: 8px 18px;
      font-size: 0.85rem;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 8px;
    }

    /* ── Lobby ────────────────────────────────────── */

    .room-code {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: 0.3em;
      color: #ffcc00;
      margin: 12px 0;
      font-family: monospace;
    }

    #player-list {
      list-style: none;
      padding: 0;
      margin: 16px 0;
      text-align: left;
    }

    #player-list li {
      padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
    }

    .player-dot {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 50%;
    }

    .lobby-waiting {
      color: #888;
      font-style: italic;
      margin-top: 12px;
    }

    /* ── Countdown ────────────────────────────────── */

    #screen-countdown {
      background: rgba(0,0,0,0.65);
      z-index: 200;
    }

    .countdown-number {
      font-size: 8rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 40px rgba(68,136,255,0.6);
    }

    .countdown-animate {
      animation: countPulse 0.8s ease-out;
    }

    @keyframes countPulse {
      0%   { transform: scale(1.8); opacity: 0; }
      40%  { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.9; }
    }

    /* ── HUD ──────────────────────────────────────── */

    #screen-hud {
      pointer-events: none;
      z-index: 50;
      justify-content: flex-end;
      align-items: center;
      padding-bottom: 40px;
    }

    #hud-players {
      position: fixed;
      top: 16px; right: 16px;
      background: rgba(0,0,0,0.55);
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      pointer-events: none;
    }

    #hud-players div {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
    }

    .charge-bar-container {
      width: 220px;
      height: 16px;
      background: rgba(0,0,0,0.6);
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.2);
    }

    #charge-fill {
      height: 100%;
      width: 0%;
      background: #44cc44;
      border-radius: 6px;
      transition: width 0.05s linear;
    }

    .hud-hint {
      margin-top: 8px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      pointer-events: none;
    }

    /* ── Win Screen ───────────────────────────────── */

    #screen-win {
      background: rgba(0,0,0,0.7);
      z-index: 150;
    }

    #winner-name {
      font-size: 2.5rem;
      font-weight: 800;
      color: #ffcc00;
      margin-bottom: 20px;
    }

    .win-waiting {
      color: #888;
      font-style: italic;
      margin-top: 12px;
    }

    /* ── Toast ────────────────────────────────────── */

    #toast {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%);
      background: rgba(15,15,35,0.92);
      color: #eee;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 0.95rem;
      z-index: 300;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #toast.toast-show { opacity: 1; }
    #toast.hidden { display: block; opacity: 0; }

    /* ── Player Labels (CSS2D) ────────────────────── */

    .player-label {
      font-size: 13px;
      font-weight: 700;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      white-space: nowrap;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- Main Menu -->
  <div id="screen-main-menu" class="screen hidden">
    <div class="screen-panel">
      <h1>Mini Golf</h1>
      <h2>Multiplayer</h2>
      <input type="text" id="input-name" placeholder="Your name" maxlength="16" />
      <input type="text" id="input-code" placeholder="Room code (to join)" maxlength="4"
             style="text-transform:uppercase; letter-spacing:0.2em; text-align:center;" />
      <div class="btn-row">
        <button id="btn-create" class="btn btn-green">Create Game</button>
        <button id="btn-join" class="btn btn-primary">Join Game</button>
      </div>
    </div>
  </div>

  <!-- Lobby -->
  <div id="screen-lobby" class="screen hidden">
    <div class="screen-panel">
      <h2>Room Code</h2>
      <div class="room-code" id="lobby-code">----</div>
      <button id="btn-copy-code" class="btn btn-small btn-primary">Copy Code</button>
      <ul id="player-list"></ul>
      <button id="btn-start-game" class="btn btn-green" disabled>Start Game</button>
      <div id="lobby-waiting" class="lobby-waiting" style="display:none;">Waiting for host to start...</div>
    </div>
  </div>

  <!-- Countdown -->
  <div id="screen-countdown" class="screen hidden">
    <div id="countdown-text" class="countdown-number">3</div>
  </div>

  <!-- HUD -->
  <div id="screen-hud" class="screen hidden">
    <div id="hud-players"></div>
    <div class="charge-bar-container">
      <div id="charge-fill"></div>
    </div>
    <div class="hud-hint">Hold SPACE to charge &middot; Release to shoot &middot; W to jump</div>
  </div>

  <!-- Win Screen -->
  <div id="screen-win" class="screen hidden">
    <div class="screen-panel">
      <div id="winner-name">Player wins!</div>
      <button id="btn-play-again" class="btn btn-green">Play Again</button>
      <div id="win-waiting" class="win-waiting" style="display:none;">Waiting for host...</div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
