<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⛳ Map Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      overflow: hidden;
      background: #1a3a4a;
      color: #004D5C;
      display: flex;
      height: 100vh;
    }

    /* ── Toolbar ─────────────────────────────── */

    #toolbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(16px) saturate(1.5);
      -webkit-backdrop-filter: blur(16px) saturate(1.5);
      border-bottom: 1.5px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,80,100,0.15);
    }

    #toolbar .title {
      font-weight: 700;
      font-size: 1.1rem;
      color: white;
      margin-right: 16px;
      text-shadow: 0 1px 4px rgba(0,194,204,0.4);
    }

    .tb-btn {
      padding: 6px 14px;
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .tb-btn:hover { background: rgba(255,255,255,0.25); transform: translateY(-1px); }
    .tb-btn:active { transform: translateY(1px); }
    .tb-btn.active {
      background: rgba(0,194,204,0.4);
      border-color: rgba(0,194,204,0.7);
    }

    .tb-sep {
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,0.2);
      margin: 0 6px;
    }

    .tb-spacer { flex: 1; }

    /* ── Left Panel ──────────────────────────── */

    #left-panel {
      position: fixed;
      top: 48px; left: 0; bottom: 0;
      width: 200px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(14px) saturate(1.4);
      -webkit-backdrop-filter: blur(14px) saturate(1.4);
      border-right: 1.5px solid rgba(255,255,255,0.25);
      overflow-y: auto;
      z-index: 50;
      padding: 12px;
    }

    .panel-heading {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.6);
      margin-bottom: 8px;
      margin-top: 12px;
    }
    .panel-heading:first-child { margin-top: 0; }

    .add-btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 6px;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 10px;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }
    .add-btn:hover { background: rgba(0,194,204,0.25); }

    .piece-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      margin-bottom: 4px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: rgba(255,255,255,0.85);
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.1s;
    }
    .piece-item:hover { background: rgba(255,255,255,0.15); }
    .piece-item.selected { background: rgba(0,194,204,0.3); border-color: rgba(0,194,204,0.6); }
    .piece-item .swatch {
      width: 12px; height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .piece-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .piece-item .del-btn {
      background: none; border: none;
      color: rgba(255,100,100,0.7);
      font-size: 1rem;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }
    .piece-item .del-btn:hover { color: #ff4444; }

    /* ── Right Panel ─────────────────────────── */

    #right-panel {
      position: fixed;
      top: 48px; right: 0; bottom: 0;
      width: 240px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(14px) saturate(1.4);
      -webkit-backdrop-filter: blur(14px) saturate(1.4);
      border-left: 1.5px solid rgba(255,255,255,0.25);
      overflow-y: auto;
      z-index: 50;
      padding: 12px;
    }

    .prop-group {
      margin-bottom: 14px;
    }

    .prop-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.55);
      margin-bottom: 4px;
    }

    .prop-row {
      display: flex;
      gap: 6px;
      margin-bottom: 4px;
    }

    .prop-row label {
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      width: 16px;
      text-align: right;
      line-height: 28px;
    }

    .prop-row input[type="number"] {
      flex: 1;
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 6px;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      padding: 4px 8px;
      outline: none;
      width: 0;
      transition: border-color 0.15s;
    }
    .prop-row input[type="number"]:focus {
      border-color: #00C2CC;
      box-shadow: 0 0 0 2px rgba(0,194,204,0.2);
    }

    .prop-row input[type="color"] {
      width: 36px; height: 28px;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      background: none;
      cursor: pointer;
      padding: 0;
    }

    #no-selection {
      color: rgba(255,255,255,0.4);
      font-style: italic;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 40px;
    }

    /* ── Viewport ────────────────────────────── */

    #viewport {
      position: fixed;
      top: 48px; left: 200px; right: 240px; bottom: 0;
      background: #1a3a4a;
    }

    #viewport canvas { display: block; }

    /* ── Map Name Input ──────────────────────── */

    #map-name-input {
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 4px 10px;
      outline: none;
      width: 160px;
      transition: border-color 0.15s;
    }
    #map-name-input:focus { border-color: #00C2CC; }

    /* ── Scrollbar ───────────────────────────── */

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
  </style>
</head>
<body>
  <!-- Toolbar -->
  <div id="toolbar">
    <span class="title">⛳ Map Builder</span>
    <input type="text" id="map-name-input" value="Untitled" placeholder="Map name" />
    <div class="tb-sep"></div>
    <button class="tb-btn active" id="btn-translate" title="Move (G)">Move</button>
    <button class="tb-btn" id="btn-rotate" title="Rotate (R)">Rotate</button>
    <button class="tb-btn" id="btn-scale" title="Scale (S)">Scale</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btn-set-start" title="Place start position">Set Start</button>
    <button class="tb-btn" id="btn-set-hole" title="Place hole position">Set Hole</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btn-toggle-time" title="Toggle day/night">☀️ Day</button>
    <div class="tb-spacer"></div>
    <button class="tb-btn" id="btn-import">Import</button>
    <button class="tb-btn" id="btn-export" style="background:rgba(168,212,0,0.3);border-color:rgba(168,212,0,0.5);">Export JSON</button>
    <button class="tb-btn" id="btn-new">New</button>
  </div>

  <!-- Left Panel: Palette + Piece List -->
  <div id="left-panel">
    <div class="panel-heading">Add Piece</div>
    <button class="add-btn" data-type="box">📦 Box</button>
    <button class="add-btn" data-type="cylinder">🛢 Cylinder</button>
    <button class="add-btn" data-type="wall">🧱 Wall</button>
    <button class="add-btn" data-type="ramp">📐 Ramp</button>

    <div class="panel-heading">Pieces</div>
    <div id="piece-list"></div>
  </div>

  <!-- Right Panel: Properties -->
  <div id="right-panel">
    <div class="panel-heading">Properties</div>
    <div id="no-selection">Click a piece to select it</div>
    <div id="props" style="display:none;">
      <div class="prop-group">
        <div class="prop-label">Position</div>
        <div class="prop-row"><label>X</label><input type="number" id="px" step="0.1"></div>
        <div class="prop-row"><label>Y</label><input type="number" id="py" step="0.1"></div>
        <div class="prop-row"><label>Z</label><input type="number" id="pz" step="0.1"></div>
      </div>
      <div class="prop-group">
        <div class="prop-label">Rotation (rad)</div>
        <div class="prop-row"><label>X</label><input type="number" id="rx" step="0.05"></div>
        <div class="prop-row"><label>Y</label><input type="number" id="ry" step="0.05"></div>
        <div class="prop-row"><label>Z</label><input type="number" id="rz" step="0.05"></div>
      </div>
      <div class="prop-group" id="box-size-group">
        <div class="prop-label">Size</div>
        <div class="prop-row"><label>W</label><input type="number" id="sw" step="0.1" min="0.1"></div>
        <div class="prop-row"><label>H</label><input type="number" id="sh" step="0.1" min="0.1"></div>
        <div class="prop-row"><label>D</label><input type="number" id="sd" step="0.1" min="0.1"></div>
      </div>
      <div class="prop-group" id="cyl-size-group" style="display:none;">
        <div class="prop-label">Cylinder</div>
        <div class="prop-row"><label>rT</label><input type="number" id="crt" step="0.05" min="0.05"></div>
        <div class="prop-row"><label>rB</label><input type="number" id="crb" step="0.05" min="0.05"></div>
        <div class="prop-row"><label>H</label><input type="number" id="ch" step="0.1" min="0.1"></div>
        <div class="prop-row"><label>Sg</label><input type="number" id="cseg" step="1" min="3"></div>
      </div>
      <div class="prop-group">
        <div class="prop-label">Color</div>
        <div class="prop-row"><input type="color" id="pcolor" value="#5ab85a"></div>
      </div>
      <div class="prop-group">
        <button class="tb-btn" id="btn-duplicate" style="width:100%;margin-bottom:6px;">Duplicate</button>
        <button class="tb-btn" id="btn-delete" style="width:100%;background:rgba(255,80,80,0.25);border-color:rgba(255,80,80,0.4);">Delete</button>
      </div>
    </div>

    <div class="panel-heading" style="margin-top:24px;">Start Position</div>
    <div class="prop-row"><label>X</label><input type="number" id="sx" step="0.1" value="0"></div>
    <div class="prop-row"><label>Y</label><input type="number" id="sy" step="0.1" value="9"></div>
    <div class="prop-row"><label>Z</label><input type="number" id="sz" step="0.1" value="0"></div>

    <div class="panel-heading" style="margin-top:12px;">Hole Position</div>
    <div class="prop-row"><label>X</label><input type="number" id="hx" step="0.1" value="0"></div>
    <div class="prop-row"><label>Y</label><input type="number" id="hy" step="0.1" value="8.5"></div>
    <div class="prop-row"><label>Z</label><input type="number" id="hz" step="0.1" value="-20"></div>
  </div>

  <!-- Viewport -->
  <div id="viewport"></div>

  <input type="file" id="file-input" accept=".json" style="display:none;">
  <script type="module" src="/src/builder.js"></script>
</body>
</html>
